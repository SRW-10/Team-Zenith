<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResQlink - Update Resources</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">



</head>

<body>

<div class="sidebar">
  <h2>ResQlink</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="update.html">Update Resources</a>
  <a href="staff.html">Staff Management</a>
  <a href="patient.html">Patient Management</a>
</div>

<div class="main">
  <div class="header">Update Hospital Resources</div>

  <div class="cards">
    <div class="card">
      <h3>Beds</h3>
      <p id="bedsCard">0</p>
      <div class="department">All Wards</div>
    </div>
    <div class="card">
      <h3>ICU</h3>
      <p id="icuCard">0</p>
      <div class="department">ICU</div>
    </div>
    <div class="card">
      <h3>Ambulances</h3>
      <p id="ambulanceCard">0</p>
      <div class="department">Emergency</div>
    </div>
    <div class="card">
      <h3>Oxygen Units</h3>
      <p id="oxygenCard">0</p>
      <div class="department">All Wards</div>
    </div>
  </div>

  <div class="formBox">
    <label>Available Beds</label>
    <input type="number" id="bedsInput" placeholder="Enter number of beds">
    <label>ICU Units</label>
    <input type="number" id="icuInput" placeholder="Enter ICU units">
    <label>Ambulances</label>
    <input type="number" id="ambulanceInput" placeholder="Enter number of ambulances">
    <label>Oxygen Units</label>
    <input type="number" id="oxygenInput" placeholder="Enter oxygen units">
    <button onclick="updateResources()">Update Resources</button>
  </div>
</div>

<div id="toast" class="toast"></div>
<<script type="module">
import { loadResources, updateResources } from "./script.js";
loadResources();
window.updateResources = updateResources; // used by button onclick
</script>
</body>
</html>
